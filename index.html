    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Hind Siliguri', sans-serif; -webkit-tap-highlight-color: transparent; }

      /* Splash screen */
      #splash {
        position: fixed; inset: 0;
        background: linear-gradient(160deg, #060910 0%, #064e3b 60%, #0a1020 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash svg { animation: splashPulse 1.2s ease-in-out infinite alternate; }
      @keyframes splashPulse {
        from { transform: scale(0.92); opacity: 0.85; }
        to   { transform: scale(1.04); opacity: 1; }
      }
      #splash-title {
        font-family: 'Hind Siliguri', sans-serif;
        font-size: 28px; font-weight: 800;
        color: #fff; margin-top: 20px;
        letter-spacing: 1px;
      }
      #splash-sub {
        font-family: Arial, sans-serif;
        font-size: 13px; color: rgba(255,255,255,0.4);
        margin-top: 8px; letter-spacing: 2px;
      }
      #splash-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #00e676; margin-top: 32px;
        animation: dotBlink 0.8s ease-in-out infinite alternate;
      }
      @keyframes dotBlink {
        from { opacity: 0.3; transform: scale(0.8); }
        to   { opacity: 1;   transform: scale(1.2); }
      }
    </style>

    <div id="splash">

    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      // Hide splash when React loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
        }, 1200);
      });

      // Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
